<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wordle Pro</title>

<style>
:root{
  --bg:#fff;
  --text:#111;
  --tile:#d3d6da;
  --key:#c0c0c0;
}

body.dark{
  --bg:#121213;
  --text:#fff;
  --tile:#3a3a3c;
  --key:#818384;
}

body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  text-align:center;
  margin:0;
  padding:20px;
  transition:.3s;
}

h1{letter-spacing:3px}

/* TOP BAR */
#topBar{
  position:fixed;
  top:12px;
  right:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* SWITCH */
#modeSwitch{
  width:50px;
  height:26px;
  background:#818384;
  border-radius:50px;
  cursor:pointer;
  position:relative;
}

#modeSwitch::after{
  content:"";
  position:absolute;
  width:20px;
  height:20px;
  top:3px;
  left:3px;
  background:white;
  border-radius:50%;
  transition:.3s;
}

body.dark #modeSwitch{
  background:#4cd964;
}

body.dark #modeSwitch::after{
  transform:translateX(24px);
}

/* HINT */
#hintBtn{
  background:var(--key);
  color:var(--text);
  border:none;
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
  font-size:12px;
}

/* BOARD */
#board{
  display:grid;
  grid-template-columns:repeat(5,62px);
  gap:6px;
  justify-content:center;
  margin:60px auto 20px;
}

.tile{
  width:62px;
  height:62px;
  border:2px solid var(--tile);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  font-weight:700;
  text-transform:uppercase;
}

.flip{animation:flip .5s ease}

@keyframes flip{
  0%{transform:rotateX(0)}
  50%{transform:rotateX(90deg)}
  100%{transform:rotateX(0)}
}

.correct{background:#538d4e;color:#fff;border-color:#538d4e}
.present{background:#b59f3b;color:#fff;border-color:#b59f3b}
.absent{background:#3a3a3c;color:#fff}

/* KEYBOARD */
.row{display:flex;justify-content:center;margin:4px}

.key{
  border:none;
  border-radius:6px;
  padding:14px 10px;
  margin:2px;
  background:var(--key);
  color:var(--text);
  font-weight:700;
  cursor:pointer;
}

.big{padding:14px 18px}

.key.correct{background:#538d4e!important}
.key.present{background:#b59f3b!important}
.key.absent{background:#3a3a3c!important}

/* POPUPS */
.popup{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:300px;
  background:var(--bg);
  border:2px solid var(--tile);
  border-radius:12px;
  padding:20px;
  display:none;
  z-index:999;
}

.closeBtn{
  position:absolute;
  top:8px;
  left:8px;
  background:red;
  color:white;
  border:none;
  border-radius:6px;
  padding:4px 8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>WORDLE PRO</h1>

<div id="topBar">
  <span>Dark Mode</span>
  <div id="modeSwitch" onclick="toggleMode()"></div>
  <button id="hintBtn" onclick="openHint()">💡 Hint</button>
</div>

<div id="board"></div>
<div id="keyboard"></div>

<!-- POPUPS -->
<div id="hintBox" class="popup">
  <button class="closeBtn" onclick="closeHint()">X</button>
  <h3>Hint</h3>
  <p id="hintText"></p>
</div>

<div id="endBox" class="popup">
  <button class="closeBtn" onclick="closeEnd()">X</button>
  <h2 id="endTitle"></h2>
  <p id="endText"></p>
</div>

<script>

/* =========================
   LOCKED GAME (NO RESET CHEAT)
========================= */
const CURRENT_ANSWER = "LIGHT";
  const SAVE_KEY = "wordle_pro_locked_v14";
/* Create persistent game ONCE */
let save = JSON.parse(localStorage.getItem(SAVE_KEY));

if(!save){
  save = {
    answer: "LIGHT",
    row:0,
    col:0,
    used:[],
    grid:Array.from({length:6},()=>Array(5).fill("")),
    gameOver:false
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(save));
}

/* STATE */
let answer = save.answer;
let row = save.row;
let col = save.col;
let used = new Set(save.used);
let grid = save.grid;
let gameOver = save.gameOver;

/* =========================
   SAVE FUNCTION
========================= */
function saveGame(){
  localStorage.setItem(SAVE_KEY, JSON.stringify({
    answer,
    row,
    col,
    used:[...used],
    grid,
    gameOver
  }));
}

/* =========================
   BOARD
========================= */
const board=document.getElementById("board");
const kb=document.getElementById("keyboard");

for(let i=0;i<30;i++){
  const d=document.createElement("div");
  d.className="tile";
  board.appendChild(d);
}

function render(){
  for(let r=0;r<6;r++){
    for(let c=0;c<5;c++){
      board.children[r*5+c].textContent=grid[r][c];
    }
  }
}

/* =========================
   KEY COLORS
========================= */
function colorKey(letter,cls){
  document.querySelectorAll(".key").forEach(k=>{
    if(k.dataset.k===letter){
      k.classList.remove("correct","present","absent");
      k.classList.add(cls);
    }
  });
}

/* =========================
   INPUT (keyboard + clicks)
========================= */
function input(key){
  if(gameOver) return;

  key = key.toUpperCase();

  if(key==="ENTER") return submit();

  if(key==="BACKSPACE"){
    if(col>0){
      col--;
      grid[row][col]="";
      render();
      saveGame();
    }
    return;
  }

  if(/^[A-Z]$/.test(key)){
    if(col<5){
      grid[row][col]=key;
      col++;
      render();
      saveGame();
    }
  }
}

/* =========================
   🔥 PHYSICAL KEYBOARD FIX
========================= */
document.addEventListener("keydown",(e)=>{

  if(gameOver) return;

  const key = e.key;

  if(key==="Enter"){
    input("ENTER");
  }
  else if(key==="Backspace"){
    input("BACKSPACE");
  }
  else if(/^[a-zA-Z]$/.test(key)){
    input(key.toUpperCase());
  }
});

/* =========================
   SUBMIT
========================= */
function submit(){
  const guess = grid[row].join("");

  if(guess.length<5) return;

  if(used.has(guess)){
    showMessage("Word Already Guessed");
    return;
  }

  used.add(guess);

  for(let i=0;i<5;i++){
    const tile = board.children[row*5+i];
    tile.classList.add("flip");

    setTimeout(()=>{
      if(guess[i]===answer[i]){
        tile.classList.add("correct");
        colorKey(guess[i],"correct");
      }
      else if(answer.includes(guess[i])){
        tile.classList.add("present");
        colorKey(guess[i],"present");
      }
      else{
        tile.classList.add("absent");
        colorKey(guess[i],"absent");
      }
    },200);
  }

  if(guess===answer){
    gameOver=true;
    setTimeout(()=>showEnd(true),600);
  } else {
    row++;
    col=0;

    if(row===6){
      gameOver=true;
      showEnd(false);
    }
  }

  saveGame();
}

/* =========================
   POPUPS
========================= */
function showMessage(text){
  document.getElementById("hintText").textContent=text;
  document.getElementById("hintBox").style.display="block";
}

function openHint(){
  document.getElementById("hintText").textContent =
    "A 5-letter everyday word.";
  document.getElementById("hintBox").style.display="block";
}

function closeHint(){
  document.getElementById("hintBox").style.display="none";
}

function closeEnd(){
  document.getElementById("endBox").style.display="none";
}

/* =========================
   END SCREEN
========================= */
function showEnd(win){
  document.getElementById("endBox").style.display="block";

  document.getElementById("endTitle").textContent =
    win ? "🎉 You Win!" : "Better Luck Next Time";

  document.getElementById("endText").textContent =
    win ? "" : "Word Was: " + answer;
}

/* =========================
   MODE
========================= */
function toggleMode(){
  document.body.classList.toggle("dark");
}

/* =========================
   KEYBOARD
========================= */
function buildKeyboard(){
  ["QWERTYUIOP","ASDFGHJKL","ENTER ZXCVBNM BACKSPACE"].forEach(r=>{
    const div=document.createElement("div");
    div.className="row";

    r.split(" ").forEach(part=>{
      if(part==="ENTER"||part==="BACKSPACE"){
        const b=document.createElement("button");
        b.className="key big";
        b.textContent=part==="BACKSPACE"?"⌫":"ENTER";
        b.onclick=()=>input(part);
        div.appendChild(b);
      } else {
        [...part].forEach(ch=>{
          const b=document.createElement("button");
          b.className="key";
          b.textContent=ch;
          b.dataset.k=ch;
          b.onclick=()=>input(ch);
          div.appendChild(b);
        });
      }
    });

    kb.appendChild(div);
  });
}

/* =========================
   INIT
========================= */
buildKeyboard();
render();

</script>

</body>
</html>
