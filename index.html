
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wordle Pro</title>
<style>
body{font-family:system-ui,sans-serif;background:#121213;color:#fff;text-align:center;margin:0;padding:20px}
h1{letter-spacing:3px}
#board{display:grid;grid-template-columns:repeat(5,62px);gap:6px;justify-content:center;margin:20px auto}
.tile{width:62px;height:62px;border:2px solid #3a3a3c;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;text-transform:uppercase;transition:.35s}
.correct{background:#538d4e;border-color:#538d4e}
.present{background:#b59f3b;border-color:#b59f3b}
.absent{background:#3a3a3c;border-color:#3a3a3c}
.row{display:flex;justify-content:center;margin:4px}
.key{border:none;border-radius:6px;padding:14px 10px;margin:2px;background:#818384;color:white;font-weight:700;cursor:pointer}
.big{padding:14px 18px}
#msg{height:24px;font-weight:bold}
</style>
</head>
<body>
<h1>WORDLE PRO</h1>
<div id="board"></div>
<div id="msg"></div>
<div id="keyboard"></div>

<script>
const ANSWERS=[
"APPLE","TREES","POPPY","HOUSE","STONE","SMILE","PLANT","WATER","HEART","BREAD",
"LIGHT","TRAIN","BEACH","CLOUD","DREAM","MOUSE","GREEN","BLACK","WHITE","CHAIR",
"TABLE","GRAPE","BRICK","SHARE","CRANE","SLATE","ADORE","ALONE","BRAVE","SWEET"
];

// Valid guesses (much larger than answers)
const VALID=new Set([
...ANSWERS,
"ABBEY","ABIDE","ABOUT","ABOVE","ACTOR","ACUTE","ADULT","AFTER","AGAIN","AGENT",
"AGREE","ALBUM","ALERT","ALIEN","ALIGN","ANGLE","ANGRY","APART","ARISE","ARMOR",
"ASIDE","AUDIO","AWARD","AWARE","BADGE","BAKER","BASIC","BASIS","BEGAN","BEGUN",
"BLAME","BLEND","BLIND","BLOCK","BLOOD","BOARD","BOOST","BOOTH","BOUND","BRAIN",
"BRAND","BREAD","BREAK","BRING","BROAD","BROWN","BUILD","CABLE","CANDY","CARRY",
"CAUSE","CHAIN","CHAIR","CHARM","CHEST","CHIEF","CHILD","CHOSE","CIVIL","CLASS",
"CLEAN","CLEAR","CLERK","CLOCK","COACH","COAST","COUNT","COURT","COVER","CRAZY",
"CREAM","CROSS","CROWD","CROWN","DAILY","DANCE","DEALT","DEATH","DEPTH","DOING",
"DRAFT","DRAMA","DRAWN","DRESS","DRINK","DRIVE","EARTH","ENJOY","ENTER","ERROR",
"EVENT","EVERY","FAITH","FALSE","FIELD","FINAL","FIRST","FLAME","FLEET","FLOOR",
"FOCUS","FORCE","FRAME","FRESH","FRONT","FRUIT","GIANT","GLASS","GRACE","GRADE",
"GRAND","GRANT","GRASS","GREAT","GROUP","GUARD","GUESS","HAPPY","HORSE","HOTEL",
"HUMAN","IDEAL","IMAGE","INDEX","INNER","ISSUE","JUICE","KNIFE","KNOWN","LARGE",
"LASER","LATER","LAYER","LEARN","LEMON","LEVEL","LOCAL","LOGIC","LUCKY","MAGIC",
"MAJOR","MARCH","MATCH","METAL","MIGHT","MINOR","MODEL","MONEY","MOTOR","MUSIC",
"NERVE","NIGHT","NOBLE","NOISE","NORTH","NOVEL","NURSE","OCCUR","OCEAN","OFFER",
"ORDER","OTHER","PAINT","PANEL","PARTY","PEACE","PHONE","PIANO","PIECE","PILOT",
"PIZZA","PLANE","POWER","PRESS","PRICE","PRIDE","PRIME","PRINT","PRIZE","PROOF",
"PROUD","QUEEN","QUICK","RADIO","RAISE","RANGE","REACH","READY","RIGHT","RIVER",
"ROBOT","ROUGH","ROUND","ROUTE","ROYAL","RUGBY","SCALE","SCENE","SCOPE","SCORE",
"SENSE","SERVE","SEVEN","SHAPE","SHEEP","SHIFT","SHINE","SHIRT","SHOCK","SHOOT",
"SHORT","SHOWN","SIGHT","SINCE","SKILL","SLEEP","SMALL","SMART","SOLID","SOLVE",
"SOUND","SOUTH","SPACE","SPEAK","SPEED","SPEND","SPORT","STAFF","STAGE","STAND",
"START","STATE","STEEL","STICK","STILL","STORE","STORM","STORY","STYLE","SUGAR",
"TABLE","TEACH","THANK","THEME","THERE","THINK","THREE","TIGER","TODAY","TOPIC",
"TOTAL","TOUCH","TOWER","TRACK","TRADE","TRIAL","TRUCK","TRULY","TRUST","TRUTH",
"UNDER","UNION","UNITY","VALUE","VIDEO","VISIT","VOICE","WASTE","WATCH","WHEEL",
"WHERE","WHILE","WORLD","WORRY","WRITE","YOUTH","TREES","POPPY"
]);

const answer=ANSWERS[Math.floor(Math.random()*ANSWERS.length)];
let row=0,col=0,grid=Array(6).fill("").map(()=>Array(5).fill(""));

const board=document.getElementById("board");
for(let i=0;i<30;i++){let d=document.createElement("div");d.className="tile";board.appendChild(d);}

function updateBoard(){
 for(let r=0;r<6;r++)for(let c=0;c<5;c++)
  board.children[r*5+c].textContent=grid[r][c];
}
function msg(t){document.getElementById("msg").textContent=t;}

function colorKey(letter, cls){
 document.querySelectorAll(".key").forEach(k=>{
  if(k.dataset.k===letter){
   if(cls==="correct" || (!k.classList.contains("correct") && cls==="present") || (!k.classList.contains("correct")&&!k.classList.contains("present")))
      k.classList.add(cls);
  }
 });
}

function submit(){

    if(grid[row].some(letter => letter === "")){
        return msg("Not enough letters");
    }

    const guess = grid[row].join("");

    if(!VALID.has(guess)){
        return msg("Not in word list");
    }

    ...
}

 for(let i=0;i<5;i++){
   const tile=board.children[row*5+i];
   if(guess[i]===answer[i]){tile.classList.add("correct");colorKey(guess[i],"correct");}
   else if(answer.includes(guess[i])){tile.classList.add("present");colorKey(guess[i],"present");}
   else {tile.classList.add("absent");colorKey(guess[i],"absent");}
 }
 if(guess===answer){msg("🎉 Brilliant!");document.onkeydown=null;return;}
 row++; col=0;
 if(row===6){msg("Game Over — "+answer);document.onkeydown=null;}
}

function press(k){
 if(k==="ENTER") return submit();
 if(k==="BACK"){if(col>0){col--;grid[row][col]="";updateBoard();}return;}
 if(col<5 && /^[A-Z]$/.test(k)){grid[row][col]=k;col++;updateBoard();}
}

const kb=document.getElementById("keyboard");
["QWERTYUIOP","ASDFGHJKL","ENTER ZXCVBNM BACK"].forEach(r=>{
 let d=document.createElement("div");d.className="row";
 r.split(" ").forEach(part=>{
  if(part==="ENTER"||part==="BACK"){
   let b=document.createElement("button");
   b.className="key big"; b.textContent=part==="BACK"?"⌫":"ENTER";
   b.onclick=()=>press(part); d.appendChild(b);
  } else {
   [...part].forEach(ch=>{
    let b=document.createElement("button");
    b.className="key"; b.textContent=ch; b.dataset.k=ch;
    b.onclick=()=>press(ch); d.appendChild(b);
   });
  }
 });
 kb.appendChild(d);
});

document.addEventListener("keydown",e=>{
 const k=e.key.toUpperCase();
 if(/^[A-Z]$/.test(k)) press(k);
 else if(k==="ENTER") press("ENTER");
 else if(k==="BACKSPACE") press("BACK");
});
</script>
</body>
</html>
