<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wordle Pro</title>

<style>
body{
  font-family:system-ui,sans-serif;
  background:#121213;
  color:white;
  text-align:center;
  margin:0;
  padding:20px;
}

h1{letter-spacing:3px}

#board{
  display:grid;
  grid-template-columns:repeat(5,62px);
  gap:6px;
  justify-content:center;
  margin:20px auto;
}

.tile{
  width:62px;
  height:62px;
  border:2px solid #3a3a3c;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
  font-weight:700;
  text-transform:uppercase;
}

.correct{background:#538d4e;border-color:#538d4e}
.present{background:#b59f3b;border-color:#b59f3b}
.absent{background:#3a3a3c;border-color:#3a3a3c}

.row{display:flex;justify-content:center;margin:4px}

.key{
  border:none;
  border-radius:6px;
  padding:14px 10px;
  margin:2px;
  background:#818384;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.big{padding:14px 18px}

#msg{height:24px;font-weight:bold;margin-top:10px}
</style>
</head>

<body>

<h1>WORDLE CUSTOM</h1>

<div id="board"></div>
<div id="msg"></div>
<div id="keyboard"></div>

<script>
/* =========================
   🎯 SET YOUR ANSWER HERE
========================= */
const answer = "Horse"; // <-- CHANGE THIS WORD

const VALID = new Set(["APPLE","TREES","HOUSE","STONE","SMILE","PLANT","WATER","HEART","BREAD","LIGHT","TRAIN","BEACH"]);

let row = 0;
let col = 0;

let grid = Array(6).fill("").map(()=>Array(5).fill(""));

const board = document.getElementById("board");
const msgEl = document.getElementById("msg");
const kb = document.getElementById("keyboard");

// build board
for(let i=0;i<30;i++){
  let d=document.createElement("div");
  d.className="tile";
  board.appendChild(d);
}

function updateBoard(){
  for(let r=0;r<6;r++){
    for(let c=0;c<5;c++){
      board.children[r*5+c].textContent = grid[r][c];
    }
  }
}

function msg(t){
  msgEl.textContent = t;
}

function submit(){
  const guess = grid[row].join("");

  if(guess.length < 5){
    return msg("Not enough letters");
  }

  if(!VALID.has(guess)){
    return msg("Not in word list");
  }

  for(let i=0;i<5;i++){
    const tile = board.children[row*5+i];

    if(guess[i] === answer[i]){
      tile.classList.add("correct");
    }
    else if(answer.includes(guess[i])){
      tile.classList.add("present");
    }
    else{
      tile.classList.add("absent");
    }
  }

  if(guess === answer){
    msg("🎉 You Win!");
    document.onkeydown = null;
    return;
  }

  row++;
  col = 0;

  if(row === 6){
    msg("Game Over! Word was: " + answer);
    document.onkeydown = null;
  }
}

function press(k){
  if(k === "ENTER") return submit();

  if(k === "BACK"){
    if(col > 0){
      col--;
      grid[row][col] = "";
      updateBoard();
    }
    return;
  }

  if(col < 5 && /^[A-Z]$/.test(k)){
    grid[row][col] = k;
    col++;
    updateBoard();
  }
}

// keyboard
["QWERTYUIOP","ASDFGHJKL","ENTER ZXCVBNM BACK"].forEach(r=>{
  let rowDiv = document.createElement("div");
  rowDiv.className="row";

  r.split(" ").forEach(part=>{
    if(part === "ENTER" || part === "BACK"){
      let b = document.createElement("button");
      b.className = "key big";
      b.textContent = part === "BACK" ? "⌫" : "ENTER";
      b.onclick = ()=>press(part);
      rowDiv.appendChild(b);
    } else {
      [...part].forEach(ch=>{
        let b = document.createElement("button");
        b.className = "key";
        b.textContent = ch;
        b.onclick = ()=>press(ch);
        rowDiv.appendChild(b);
      });
    }
  });

  kb.appendChild(rowDiv);
});

// keyboard input
document.addEventListener("keydown",e=>{
  const k = e.key.toUpperCase();
  if(/^[A-Z]$/.test(k)) press(k);
  else if(k === "ENTER") press("ENTER");
  else if(k === "BACKSPACE") press("BACK");
});

updateBoard();
</script>

</body>
</html>
